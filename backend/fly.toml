app = "endless-dreams-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "config.settings.production"
  PORT = "8000"

# Run migrations before each new deployment goes live
[deploy]
  release_command = "python manage.py migrate --noinput"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Celery worker process
[[processes]]
  name = "worker"
  cmd = ["celery", "-A", "config.celery", "worker", "--loglevel=info", "--concurrency=2"]
